name: barbearia_pro
description: Severus Barber - Gestao Profissional de Barbearia (Multi-Usuario)
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Banco de dados SQLite (local / offline)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Gerenciamento de estado
  provider: ^6.1.2

  # Firebase - Autenticacao e banco em tempo real
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  connectivity_plus: ^6.1.5

  # Graficos interativos
  fl_chart: ^0.68.0

  # Internacionalizacao e formatacao
  intl: ^0.20.2

  # Calendario para agenda
  table_calendar: ^3.1.0

  # Exportacao PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Exportacao CSV
  csv: ^6.0.0

  # Exportacao para Excel (.xlsx)
  excel: ^4.0.2

  # Compartilhamento de arquivos
  share_plus: ^7.2.2

  # Selecao de imagem para foto de perfil
  image_picker: ^1.1.2

  # UUIDs unicos
  uuid: ^4.3.3

  # Swipe em listas (deslizar para acao)
  flutter_slidable: ^3.1.0

  # Fontes do Google
  google_fonts: ^6.2.1

  # Icones extras
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/severus_icon_square.png"
  adaptive_icon_background: "#101010"
  adaptive_icon_foreground: "assets/images/severus_icon_square.png"
  adaptive_icon_foreground_inset: 18
  min_sdk_android: 21
